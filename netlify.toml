[build]
  publish = "dist"
  command = "npm run build"

# Serve sitemap and robots directly
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# SPA fallback — serves pre-rendered index.html for every route
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
