[build]
  publish = "dist"
  command = "npm run build"

# ── Plugins ────────────────────────────────────────────────────────────
# Local build plugin: after a successful production deploy, submit every
# sitemap URL to IndexNow (Bing/Yandex/etc.) so changed pages are crawled
# within minutes. See plugins/indexnow/.
[[plugins]]
  package = "/plugins/indexnow"

# ── Headers ────────────────────────────────────────────────────────────
# Cache hashed assets (JS, CSS) immutably — Vite generates unique hashes
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for 30 days
[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=()"

# ── Redirects ──────────────────────────────────────────────────────────
# Redirect rules live in public/_redirects (copied to dist/ by Vite).
# That file is read by both Netlify and Cloudflare Pages, so all redirect
# logic is centralised there. The rules include:
#   • Pattern-based 301s for no-trailing-slash service area URLs
#   • SPA catch-all fallback  /*  →  /index.html  200
