[build]
  publish = "dist"
  command = "npm run build"

# ── Headers ────────────────────────────────────────────────────────────
# Cache hashed assets (JS, CSS) immutably — Vite generates unique hashes
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for 30 days
[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── Redirects ──────────────────────────────────────────────────────────
# NOTE: All explicit trailing-slash redirects have been removed.
# Netlify's built-in Pretty URLs feature already redirects /path → /path/
# when a dist/path/index.html file exists (prerendered). Keeping explicit
# force=true rules alongside Pretty URLs caused redirect conflicts.

# SPA fallback — fires only when no static file matches the path.
# Prerendered HTML files in dist/ are served directly before this rule.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
